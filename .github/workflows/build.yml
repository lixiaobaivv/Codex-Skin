name: Build and package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: node --test tests
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  windows-installer:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') { $version = "0.0.${{ github.run_number }}" }
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
      - name: Build Windows app
        run: npm run tauri -- build --no-bundle --config "{`"version`":`"$env:PACKAGE_VERSION`"}"
      - name: Stage application
        shell: pwsh
        run: |
          $publish = Join-Path $PWD 'artifacts\win-x64'
          New-Item -ItemType Directory -Force $publish | Out-Null
          Copy-Item 'src-tauri\target\release\codex-skin.exe' (Join-Path $publish 'Codex-Skin.exe')
      - name: Build Setup EXE
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          $source = Join-Path $PWD 'artifacts\win-x64'
          $output = Join-Path $PWD 'artifacts\installer'
          New-Item -ItemType Directory -Force $output | Out-Null
          & $iscc "/DMyAppSource=$source" "/DMyOutputDir=$output" "/DMyAppVersion=$env:PACKAGE_VERSION" installer/windows/CodexThemeStore.iss
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Skin-windows-x64
          path: artifacts/installer/Codex-Skin-Setup-win-x64.exe
          if-no-files-found: error

  macos-installer:
    needs: test
    runs-on: macos-14
    strategy:
      matrix:
        rid: [osx-arm64, osx-x64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Set version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then version="0.0.${GITHUB_RUN_NUMBER}"; fi
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
      - name: Build macOS PKG
        run: |
          chmod +x installer/macos/build-pkg.sh
          installer/macos/build-pkg.sh "${{ matrix.rid }}" "$PACKAGE_VERSION" "artifacts/Codex-Skin-${{ matrix.rid }}.pkg"
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Skin-${{ matrix.rid }}
          path: artifacts/Codex-Skin-${{ matrix.rid }}.pkg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-installer, macos-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true
      - name: Generate installer checksums
        run: |
          cd release
          sha256sum Codex-Skin-Setup-win-x64.exe Codex-Skin-osx-arm64.pkg Codex-Skin-osx-x64.pkg > Codex-Skin-installers-SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.pkg
            release/*.txt
