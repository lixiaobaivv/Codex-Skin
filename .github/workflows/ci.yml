name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-importer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Rebuild deterministic signed fixture
        shell: pwsh
        run: |
          $before = (Get-FileHash samples/dreamskin/codex-skin-sample-1.0.0.dreamskin -Algorithm SHA256).Hash
          node tools/dreamskin/build-sample.mjs
          $after = (Get-FileHash samples/dreamskin/codex-skin-sample-1.0.0.dreamskin -Algorithm SHA256).Hash
          if ($before -ne $after) { throw "Signed fixture is not deterministic." }

      - name: Validate fixture contract
        run: node --test tests/*.test.mjs

      - name: Build Windows client
        run: dotnet build src/CodexThemeStore/CodexThemeStore.csproj --configuration Release

      - name: Publish self-contained Windows client
        run: dotnet publish src/CodexThemeStore/CodexThemeStore.csproj --configuration Release --runtime win-x64 --self-contained true --output artifacts/Codex-Skin-win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true

      - name: Validate protocol parser
        shell: pwsh
        run: |
          . ./tools/windows/invoke-client.ps1
          $client = (Resolve-Path "artifacts/Codex-Skin-win-x64/Codex-Skin.exe").Path
          $protocol = Invoke-CodexSkinClient $client @('protocol', 'self-test')
          if ($protocol.ExitCode -ne 0) { throw ($protocol.Error -join "`n") }
          $isolated = Join-Path $env:RUNNER_TEMP 'codex-skin-online-catalog'
          New-Item -ItemType Directory -Force $isolated | Out-Null
          $empty = Invoke-CodexSkinClient $client @('list') $isolated
          if ($empty.ExitCode -eq 0) { throw "Standalone client unexpectedly contains bundled themes." }
          $refresh = Invoke-CodexSkinClient $client @('refresh', 'github') $isolated
          if ($refresh.ExitCode -ne 0) { throw ($refresh.Error -join "`n") }
          $themes = Invoke-CodexSkinClient $client @('list') $isolated
          if ($themes.ExitCode -ne 0 -or $themes.Output.Count -lt 4) { throw "Standalone client did not load the required official themes." }
          @('dilraba-star', 'enfp-pop', 'jackson-sage', 'kun-stage') | ForEach-Object {
            if (-not ($themes.Output -match "^$_`t")) { throw "Standalone client is missing required theme: $_" }
          }

      - name: Validate current-user shell registration
        shell: pwsh
        run: |
          . ./tools/windows/invoke-client.ps1
          $client = (Resolve-Path "artifacts/Codex-Skin-win-x64/Codex-Skin.exe").Path
          $register = Invoke-CodexSkinClient $client @('protocol', 'register')
          if ($register.ExitCode -ne 0) { throw ($register.Error -join "`n") }
          $status = Invoke-CodexSkinClient $client @('protocol', 'status')
          if ($status.ExitCode -ne 0 -or $status.Output -ne "registered") { throw "dreamskin protocol registration failed." }
          $unregister = Invoke-CodexSkinClient $client @('protocol', 'unregister')
          if ($unregister.ExitCode -ne 0) { throw ($unregister.Error -join "`n") }
          $status = Invoke-CodexSkinClient $client @('protocol', 'status')
          if ($status.ExitCode -ne 0 -or $status.Output -ne "not registered") { throw "dreamskin protocol cleanup failed." }

      - name: Import signed fixture into isolated library
        shell: pwsh
        run: |
          . ./tools/windows/invoke-client.ps1
          $client = (Resolve-Path "artifacts/Codex-Skin-win-x64/Codex-Skin.exe").Path
          $env:CODEX_THEME_LIBRARY_DIR = Join-Path $env:RUNNER_TEMP "dreamskin-library"
          $import = Invoke-CodexSkinClient $client @('import', 'samples/dreamskin/codex-skin-sample-1.0.0.dreamskin') $PWD.Path
          if ($import.ExitCode -ne 0) { throw ($import.Error -join "`n") }
          $manifest = Join-Path $env:CODEX_THEME_LIBRARY_DIR "codex-skin.jackson-sage-sample/1.0.0/theme.json"
          if (-not (Test-Path -LiteralPath $manifest)) { throw "Signed fixture was not installed." }
          $env:CODEX_THEME_CATALOG_DIAGNOSTICS = "1"
          $themes = Invoke-CodexSkinClient $client @('list') $PWD.Path
          $themes.Output | Write-Host
          if ($themes.ExitCode -ne 0 -or -not ($themes.Output -match "codex-skin.jackson-sage-sample")) { throw "Imported theme did not persist in the theme list." }

      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Skin-win-x64
          path: artifacts/Codex-Skin-win-x64
          if-no-files-found: error
