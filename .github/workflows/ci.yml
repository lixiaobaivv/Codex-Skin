name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Rebuild deterministic signed fixture
        shell: pwsh
        run: |
          $before = (Get-FileHash samples/dreamskin/codex-skin-sample-1.0.0.dreamskin -Algorithm SHA256).Hash
          node tools/dreamskin/build-sample.mjs
          $after = (Get-FileHash samples/dreamskin/codex-skin-sample-1.0.0.dreamskin -Algorithm SHA256).Hash
          if ($before -ne $after) { throw "Signed fixture is not deterministic." }
      - run: node --test tests/dreamskin-catalog-fixtures.test.mjs tests/dreamskin-fixture.test.mjs tests/release-contract.test.mjs
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Validate live official catalog
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked repository::tests::syncs_and_validates_official_catalog -- --ignored --exact
      - name: Build Tauri executable
        run: npm run tauri -- build --no-bundle
      - name: Validate release payload
        shell: pwsh
        run: |
          $output = 'artifacts/Codex-Skin-win-x64'
          New-Item -ItemType Directory -Force $output | Out-Null
          Copy-Item src-tauri/target/release/codex-skin.exe "$output/Codex-Skin.exe"
          @('themes','previews','backgrounds','logos','pets') | ForEach-Object {
            if (Test-Path (Join-Path $output $_)) { throw "Online theme assets must not be bundled: $_" }
          }
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Skin-win-x64
          path: artifacts/Codex-Skin-win-x64/Codex-Skin.exe
          if-no-files-found: error
