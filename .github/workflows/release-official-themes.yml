name: Publish reviewed Codex-Skin themes

on:
  workflow_dispatch:
    inputs:
      theme_id:
        description: Optional pending theme ID; blank publishes every pending theme
        required: false
        default: ""
      store_ref:
        description: Exact Codex-Skin-Store branch, tag, or commit
        required: true
        default: main

permissions:
  contents: write

concurrency:
  group: official-theme-publisher
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.pending.outputs.themes }}
      count: ${{ steps.pending.outputs.count }}
      store_commit: ${{ steps.pending.outputs.store_commit }}
    steps:
      - uses: actions/checkout@v7

      - name: Check out the Store source of truth
        uses: actions/checkout@v7
        with:
          repository: lixiaobaivv/Codex-Skin-Store
          ref: ${{ inputs.store_ref }}
          path: store-source
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: store-source/package-lock.json

      - run: npm ci
        working-directory: store-source

      - name: Validate Store catalogs and discover pending themes
        id: pending
        env:
          REQUESTED_THEME: ${{ inputs.theme_id }}
        run: |
          npm --prefix store-source run catalog:check
          themes="$(node tools/dreamskin/find-pending-official-themes.mjs store-source "$REQUESTED_THEME")"
          echo "themes=$themes" >> "$GITHUB_OUTPUT"
          echo "count=$(node -e 'console.log(JSON.parse(process.argv[1]).length)' "$themes")" >> "$GITHUB_OUTPUT"
          echo "store_commit=$(git -C store-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    if: needs.discover.outputs.count != '0'
    needs: discover
    runs-on: ubuntu-latest
    environment: theme-publishing
    strategy:
      fail-fast: false
      matrix:
        theme_id: ${{ fromJSON(needs.discover.outputs.pending) }}
    steps:
      - uses: actions/checkout@v7

      - name: Check out the reviewed Store commit
        uses: actions/checkout@v7
        with:
          repository: lixiaobaivv/Codex-Skin-Store
          ref: ${{ needs.discover.outputs.store_commit }}
          path: store-source
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve immutable release metadata
        id: metadata
        env:
          THEME_ID: ${{ matrix.theme_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p 'require(`./store-source/catalog/themes/${process.env.THEME_ID}.json`).version')"
          release_tag="theme-${THEME_ID}-v${version}"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Release $release_tag already exists and is immutable." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "package_name=Codex-Skin-theme-${THEME_ID}-${version}.dreamskin" >> "$GITHUB_OUTPUT"

      - name: Build official signed package
        env:
          CODEX_SKIN_THEME_SIGNING_SEED: ${{ secrets.CODEX_SKIN_THEME_SIGNING_SEED }}
          CODEX_SKIN_THEME_SOURCE: store-source
          CODEX_SKIN_THEME_IDS: ${{ matrix.theme_id }}
          CODEX_SKIN_THEME_RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          CODEX_SKIN_THEME_OUTPUT: artifacts/official-theme
        run: node tools/dreamskin/build-official-themes.mjs

      - name: Verify package on both platforms
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
        run: |
          package="artifacts/official-theme/$PACKAGE_NAME"
          cargo run --manifest-path src-tauri/Cargo.toml --locked --bin dreamskin-verify -- "$package" macos
          cargo run --manifest-path src-tauri/Cargo.toml --locked --bin dreamskin-verify -- "$package" windows

      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
          THEME_ID: ${{ matrix.theme_id }}
          THEME_VERSION: ${{ steps.metadata.outputs.version }}
          STORE_COMMIT: ${{ needs.discover.outputs.store_commit }}
        run: |
          package="artifacts/official-theme/$PACKAGE_NAME"
          sha256sum "$package" > "artifacts/official-theme/${PACKAGE_NAME}.sha256"
          gh release create "$RELEASE_TAG" "$package" "artifacts/official-theme/${PACKAGE_NAME}.sha256" \
            --target "$GITHUB_SHA" \
            --title "Codex-Skin Theme: $THEME_ID v$THEME_VERSION" \
            --notes "Signed from Codex-Skin-Store commit $STORE_COMMIT. Verified on Windows and macOS before publication."
