name: Publish official Codex-Skin themes

on:
  push:
    tags:
      - "official-themes-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable theme release tag
        required: true
        default: official-themes-v1

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Build official signed themes
        env:
          CODEX_SKIN_THEME_SIGNING_SEED: ${{ secrets.CODEX_SKIN_THEME_SIGNING_SEED }}
          CODEX_SKIN_THEME_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          CODEX_SKIN_THEME_OUTPUT: artifacts/official-themes
        run: node tools/dreamskin/build-official-themes.mjs

      - name: Verify every package on both platforms
        run: |
          for package in artifacts/official-themes/*.dreamskin; do
            name="$(basename "$package" .dreamskin)"
            dotnet run --project src/CodexThemeStore.Cli --configuration Release -- theme-import "$package" macos "$RUNNER_TEMP/themes-macos-$name"
            dotnet run --project src/CodexThemeStore.Cli --configuration Release -- theme-import "$package" windows "$RUNNER_TEMP/themes-windows-$name"
          done

      - name: Generate checksums
        working-directory: artifacts/official-themes
        run: sha256sum Codex-Skin-theme-*.dreamskin > Codex-Skin-official-themes-SHA256SUMS.txt

      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^official-themes-v[0-9]+$ ]]; then
            echo "Release tag must match official-themes-v<number>." >&2
            exit 2
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists and is immutable." >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" artifacts/official-themes/Codex-Skin-theme-*.dreamskin artifacts/official-themes/Codex-Skin-official-themes-SHA256SUMS.txt \
            --target "$GITHUB_SHA" \
            --title "Codex-Skin Official Themes v1" \
            --notes "Four reviewed Codex-Skin themes for Windows and macOS. Packages are signed with the official Ed25519 publisher key and verified by CI."
